name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Install Dependencies
      - name: Install Dependencies
        run: npm install

      # ✅ Build NestJS Project
      - name: Build Project
        run: npm run build

      # ✅ Docker Login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build Docker Image
      - name: Build Docker Image
        run: docker build -t krishna1998227/my-app .

      # ✅ Push Docker Image
      - name: Push Docker Image
        run: docker push krishna1998227/my-app